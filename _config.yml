# Site settings
title:          Nono Heryana
description:    "Part time hard worker, full time dreamer."
baseurl:        ""
url:            "https://nono.my.id"

# Google Analytics
google_analytics: UA-57091699-3

# Author
author:
  name:         Nono Heryana
  url:          https://nono.my.id
  email:        nonoheryana@gmail.com

# Build settings
markdown:       kramdown
include:
  - _pages

# Assets
