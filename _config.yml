# Site
name: 'Nono Heryana'
description: 'Part time hard worker, full time dreamer.'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: ''
disqus: 'nonohry'
email: 'nonoheryana@gmail.com'
mailchimp-list: ''

include: ["_pages"]
permalink: /:title/

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  
authors:
    nono:
      name:           Nono Heryana
      site:           https://nono.my.id
      avatar:         /assets/images/avatar.jpg
      bio:            "Hi, I am Nono, the author of this blog. I hope you like it!"
      email:          nonoheryana@gmail.com
      twitter:        https://twitter.com/ryujiazka
 
# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: Nono Heryana
      avatar: /assets/images/avatar.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      
# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10



# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]